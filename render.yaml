services:
  - type: web
    name: regex-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: >
      sh -c "python manage.py migrate &&
             gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: POSTGRES_DB
        fromDatabase:
          name: regex-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: regex-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: regex-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: regex-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: regex-db
          property: port
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini

  - type: worker
    name: regex-worker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A core worker --loglevel=info
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: POSTGRES_DB
        fromDatabase:
          name: regex-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: regex-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: regex-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: regex-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: regex-db
          property: port
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini

  - type: redis
    name: regex-redis
    plan: free
    ipAllowList: []

databases:
  - name: regex-db
    plan: free
