services:
  - type: web
    name: regex-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: sh render-start.sh
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "true"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "true"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "true"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: POSTGRES_DB
        fromDatabase:
          name: regex-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: regex-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: regex-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: regex-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: regex-db
          property: port
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: REDIS_CACHE_URL
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: SPARK_MASTER
        value: local[1]
      - key: SPARK_LOCAL_IP
        value: 127.0.0.1
      - key: SPARK_LOCAL_HOSTNAME
        value: localhost
      - key: SPARK_DRIVER_BIND_ADDRESS
        value: 127.0.0.1
      - key: SPARK_DRIVER_HOST
        value: 127.0.0.1
      - key: SPARK_DRIVER_MEMORY
        value: 512m
      - key: SPARK_EXECUTOR_MEMORY
        value: 512m
      - key: SPARK_SQL_SHUFFLE_PARTITIONS
        value: "1"
      - key: SPARK_WRITE_PARQUET
        value: "false"

  - type: worker
    name: regex-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: sh render-worker-start.sh
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: POSTGRES_DB
        fromDatabase:
          name: regex-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: regex-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: regex-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: regex-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: regex-db
          property: port
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: REDIS_CACHE_URL
        fromService:
          type: redis
          name: regex-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: SPARK_MASTER
        value: local[1]
      - key: SPARK_LOCAL_IP
        value: 127.0.0.1
      - key: SPARK_LOCAL_HOSTNAME
        value: localhost
      - key: SPARK_DRIVER_BIND_ADDRESS
        value: 127.0.0.1
      - key: SPARK_DRIVER_HOST
        value: 127.0.0.1
      - key: SPARK_DRIVER_MEMORY
        value: 512m
      - key: SPARK_EXECUTOR_MEMORY
        value: 512m
      - key: SPARK_SQL_SHUFFLE_PARTITIONS
        value: "1"
      - key: SPARK_WRITE_PARQUET
        value: "false"

  - type: redis
    name: regex-redis
    plan: free
    ipAllowList: []

databases:
  - name: regex-db
    plan: free
